<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200">
  <rect width="760" height="200" fill="#fff"/>
  <text x="380" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0033ff" font-weight="bold">JDBC の基本パイプライン（4ステップ）</text>
  <g font-family="monospace,sans-serif">
    <rect x="30" y="55" width="150" height="110" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="2"/>
    <text x="105" y="88" text-anchor="middle" font-size="13" fill="#0033ff" font-weight="bold">1 Connection</text>
    <text x="105" y="112" text-anchor="middle" font-size="11" fill="#333">DB に接続</text>
    <text x="105" y="135" text-anchor="middle" font-size="11" fill="#555">getConnection</text>
    <path d="M 185 110 L 215 110" stroke="#0033ff" stroke-width="2"/>
    <polygon points="215,110 205,105 205,115" fill="#0033ff"/>
    <rect x="220" y="55" width="170" height="110" rx="8" fill="#fdf5e6" stroke="#0033ff" stroke-width="2"/>
    <text x="305" y="88" text-anchor="middle" font-size="13" fill="#0033ff" font-weight="bold">2 PreparedStatement</text>
    <text x="305" y="112" text-anchor="middle" font-size="11" fill="#333">SQL を準備</text>
    <text x="305" y="135" text-anchor="middle" font-size="11" fill="#555">? に値をバインド</text>
    <path d="M 395 110 L 425 110" stroke="#0033ff" stroke-width="2"/>
    <polygon points="425,110 415,105 415,115" fill="#0033ff"/>
    <rect x="430" y="55" width="170" height="110" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="2"/>
    <text x="515" y="88" text-anchor="middle" font-size="13" fill="#0033ff" font-weight="bold">3 実行</text>
    <text x="515" y="112" text-anchor="middle" font-size="11" fill="#333">executeQuery</text>
    <text x="515" y="130" text-anchor="middle" font-size="11" fill="#333">executeUpdate</text>
    <text x="515" y="150" text-anchor="middle" font-size="10" fill="#666">SELECT / INSERT 等</text>
    <path d="M 605 110 L 635 110" stroke="#0033ff" stroke-width="2"/>
    <polygon points="635,110 625,105 625,115" fill="#0033ff"/>
    <rect x="640" y="55" width="90" height="110" rx="8" fill="#fdf5e6" stroke="#0033ff" stroke-width="2"/>
    <text x="685" y="88" text-anchor="middle" font-size="13" fill="#0033ff" font-weight="bold">4 ResultSet</text>
    <text x="685" y="115" text-anchor="middle" font-size="11" fill="#333">結果を読む</text>
    <text x="685" y="138" text-anchor="middle" font-size="10" fill="#555">next / get*</text>
  </g>
</svg>
