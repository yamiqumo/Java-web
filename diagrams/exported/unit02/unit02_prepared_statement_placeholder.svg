<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240">
  <rect width="720" height="240" fill="#fff"/>
  <text x="360" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0033ff" font-weight="bold">プレースホルダ（?）とバインド</text>
  <rect x="40" y="55" width="640" height="50" rx="6" fill="#fdf5e6" stroke="#e1dbbd" stroke-width="1"/>
  <text x="360" y="88" text-anchor="middle" font-family="Consolas,monospace" font-size="14" fill="#333">SELECT item_name, unit_price FROM items WHERE category = ? AND unit_price &gt; ?</text>
  <text x="360" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">文字列をそのまま SQL に連結しない → ? に後から値を渡す（SQL インジェクション対策）</text>
  <rect x="80" y="145" width="200" height="70" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="1"/>
  <text x="180" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">1 番目の ?</text>
  <text x="180" y="195" text-anchor="middle" font-family="monospace" font-size="13" fill="#0033ff">setString(1, "drink")</text>
  <rect x="440" y="145" width="200" height="70" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">2 番目の ?</text>
  <text x="540" y="195" text-anchor="middle" font-family="monospace" font-size="13" fill="#0033ff">setInt(2, 100)</text>
</svg>
