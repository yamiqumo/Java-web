<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6f0ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0033ff"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#fff"/>
  <text x="360" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0033ff" font-weight="bold">Java と SQL（DB）をつなぐ「橋」</text>
  <rect x="40" y="60" width="160" height="100" rx="10" fill="url(#g1)" stroke="#0033ff" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-family="monospace" font-size="15" fill="#333">Java</text>
  <text x="120" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">アプリ</text>
  <rect x="280" y="60" width="160" height="100" rx="10" fill="#fdf5e6" stroke="#0033ff" stroke-width="2"/>
  <text x="360" y="100" text-anchor="middle" font-family="monospace" font-size="14" fill="#0033ff" font-weight="bold">JDBC</text>
  <text x="360" y="128" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">ドライバ経由</text>
  <rect x="520" y="60" width="160" height="100" rx="10" fill="url(#g1)" stroke="#0033ff" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">DBMS</text>
  <text x="600" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">MySQL など</text>
  <text x="600" y="140" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">SQL を実行</text>
  <path d="M 205 110 L 270 110" stroke="#0033ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 445 110 L 510 110" stroke="#0033ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="238" y="102" font-family="sans-serif" font-size="11" fill="#333">命令</text>
  <text x="478" y="102" font-family="sans-serif" font-size="11" fill="#333">SQL</text>
  <rect x="80" y="185" width="560" height="70" rx="6" fill="#fff" stroke="#e1dbbd" stroke-width="1"/>
  <text x="360" y="208" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">前回：SQL で「何を頼むか」／今回：JDBC で「Java から頼む手順」</text>
  <text x="360" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">Connection → PreparedStatement → execute* → ResultSet</text>
</svg>
