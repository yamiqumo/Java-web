<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <rect width="760" height="300" fill="#fff"/>
  <text x="380" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#0033ff" font-weight="bold">items テーブルを Java から SELECT する流れ</text>
  <rect x="40" y="50" width="200" height="90" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="2"/>
  <text x="140" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">テーブル items</text>
  <text x="140" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">item_id, category …</text>
  <text x="140" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">（MySQL 上のデータ）</text>
  <path d="M 245 95 L 295 95" stroke="#0033ff" stroke-width="2"/>
  <polygon points="295,95 285,90 285,100" fill="#0033ff"/>
  <text x="270" y="88" font-family="sans-serif" font-size="10" fill="#333">SQL</text>
  <rect x="300" y="50" width="200" height="90" rx="8" fill="#fdf5e6" stroke="#0033ff" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">PreparedStatement</text>
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#0033ff">SELECT … FROM items</text>
  <text x="400" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">WHERE …</text>
  <path d="M 505 95 L 555 95" stroke="#0033ff" stroke-width="2"/>
  <polygon points="555,95 545,90 545,100" fill="#0033ff"/>
  <rect x="560" y="50" width="160" height="90" rx="8" fill="#f0f8ff" stroke="#0033ff" stroke-width="2"/>
  <text x="640" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">ResultSet</text>
  <text x="640" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Java で1行ずつ読む</text>
  <rect x="40" y="165" width="680" height="115" rx="8" fill="#fff" stroke="#e1dbbd"/>
  <text x="380" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">コンソール出力のイメージ</text>
  <text x="60" y="225" font-family="monospace" font-size="12" fill="#333">101 | drink | 水 | 100</text>
  <text x="60" y="248" font-family="monospace" font-size="12" fill="#333">102 | drink | お茶 | 120</text>
  <text x="380" y="275" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">※ 実際の表示形式は printf / println の書き方による</text>
</svg>
